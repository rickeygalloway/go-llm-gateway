apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-llm-gateway.fullname" . }}-config
  labels:
    {{- include "go-llm-gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      addr: ":8080"
      read_timeout: 30s
      write_timeout: 5m
      shutdown_timeout: 30s

    log:
      level: {{ .Values.gateway.log.level | quote }}
      format: {{ .Values.gateway.log.format | quote }}

    auth:
      enabled: {{ .Values.gateway.auth.enabled }}
      {{- if .Values.gateway.auth.keys }}
      keys:
        {{- range .Values.gateway.auth.keys }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}

    providers:
      {{- toYaml .Values.gateway.providers | nindent 6 }}
