run:
  timeout: 5m

linters:
  enable:
    - errcheck       # check for unchecked errors
    - gosimple       # simplify code suggestions
    - govet          # go vet checks
    - ineffassign    # detect ineffectual assignments
    - staticcheck    # static analysis
    - unused         # detect unused code
    - gofmt          # enforce formatting
    - goimports      # enforce import ordering
    - misspell       # spell checking
    - godot          # check comment punctuation

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/go-llm-gateway/go-llm-gateway

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
