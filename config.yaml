# config.yaml — Docker / production config (committed, no secrets).
# Used by docker-compose.yaml. Targets Docker service hostnames.
# For local dev outside Docker, copy config.local.yaml.example → config.local.yaml.

server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 5m
  shutdown_timeout: 30s

log:
  level: "info"
  format: "json"

auth:
  enabled: false

providers:
  - type: ollama
    name: ollama
    base_url: "http://ollama:11434"   # Docker service hostname
    priority: 0
    timeout: 120s
    models:
      - "llama3.2:latest"

  # Uncomment + set api_key to add cloud fallbacks:
  # - type: openai
  #   name: openai
  #   priority: 10
  # - type: deepseek
  #   name: deepseek
  #   priority: 20
  # - type: grok
  #   name: grok
  #   priority: 30
