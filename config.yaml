# Local development config — used when running bin/gateway directly (not in Docker).
# Ollama and other services are reached via localhost since we're outside Docker networking.
# docker-compose spins up the infra; this config points the local binary at it.

server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 5m
  shutdown_timeout: 30s

log:
  level: "debug"
  format: "console"   # human-readable for local dev

auth:
  enabled: false

providers:
  - type: ollama
    name: ollama
    base_url: "http://localhost:11434"   # localhost when running outside Docker
    priority: 0
    timeout: 120s
    models:
      - "llama3.2:latest"
      - "hermes3:8b"

  # Uncomment to test cloud fallback locally:
  # - type: openai
  #   name: openai
  #   api_key: ""    # or set GATEWAY_PROVIDERS_1_APIKEY=sk-...
  #   priority: 10
